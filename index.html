<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ENGEL Expert Academy" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#2C2C2C" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>ENGEL expert academy</title>

    <!--
      iOS PWA SAFE AREA FIX — MUSI BYĆ PIERWSZYM SKRYPTEM W <head>.

      Problem: env(safe-area-inset-bottom) w CSS zwraca 0px przy pierwszym
      renderze iOS standalone PWA — iOS oblicza tę wartość asynchronicznie.
      Fallback w env(value, 34px) NIE pomaga bo iOS *obsługuje* env(), tylko
      zwraca 0. Dlatego wszystkie podejścia przez CSS env() zawodziły.

      Rozwiązanie: synchronicznie (przed jakimkolwiek renderem) wykrywamy
      iOS standalone PWA + home indicator i ustawiamy --safe-bottom jako
      CSS variable. Reszta CSS używa var(--safe-bottom) — nigdy env().
    -->
    <script>
      (function() {
        var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
        var isStandalone = window.navigator.standalone === true;
        // iPhone z home indicator: screen.height >= 780 (iPhone X, 12, 13, 14, 15 itd.)
        // iPhone bez home indicator: screen.height <= 667 (SE, 6, 7, 8)
        // Próg 750 bezpieczny — żaden iPhone bez home indicator nie przekracza 667px
        var hasHomeIndicator = isIOS && isStandalone && window.screen.height >= 750;
        var safeBottom = hasHomeIndicator ? 34 : 0;
        document.documentElement.style.setProperty('--safe-bottom', safeBottom + 'px');
      })();
    </script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        background: #ffffff;
        overscroll-behavior: none;
        overflow: hidden;
      }

      @media (min-width: 1025px) {
        html, body {
          width: 100vw;
          height: 100vh;
          background: #d0d0d0;
        }
        #root {
          width: 100%;
          height: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .app-container {
          width: 390px !important;
          height: 90vh !important;
          max-height: 844px !important;
          box-shadow: 0 8px 40px rgba(0,0,0,0.25) !important;
        }
        .app-container.admin-desktop {
          width: min(96vw, 1200px) !important;
          height: 90vh !important;
          max-height: 90vh !important;
          box-shadow: 0 8px 40px rgba(0,0,0,0.25) !important;
        }
        .admin-layout {
          display: flex !important;
          flex-direction: row !important;
          flex: 1 !important;
          min-height: 0 !important;
          overflow: hidden !important;
        }
        .admin-sidebar {
          display: flex !important;
          flex-direction: column !important;
          width: 180px !important;
          flex-shrink: 0 !important;
          border-right: 1px solid #D0D3D6 !important;
          background: #fff !important;
          padding: 12px 0 !important;
          overflow-y: auto !important;
        }
        .admin-sidebar-btn {
          display: flex !important;
          align-items: center !important;
          gap: 10px !important;
          padding: 12px 20px !important;
          border: none !important;
          background: none !important;
          cursor: pointer !important;
          text-align: left !important;
          width: 100% !important;
          font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif !important;
          font-size: 13px !important;
          font-weight: 600 !important;
          letter-spacing: 0.2px !important;
          transition: background 0.15s !important;
        }
        .admin-sidebar-btn:hover {
          background: #f5f5f5 !important;
        }
        .admin-sidebar-btn.active {
          border-left: 3px solid #7DC142 !important;
          background: #f0f9e8 !important;
        }
        .admin-sidebar-btn .tab-icon {
          font-size: 18px !important;
        }
        .admin-content-area {
          flex: 1 !important;
          min-width: 0 !important;
          overflow: hidden !important;
          display: flex !important;
          flex-direction: column !important;
        }
        .admin-top-tabs {
          display: none !important;
        }
      }

      @media (max-width: 1024px) {
        html {
          width:  var(--app-width);
          height: var(--app-height);
        }
        body {
          width:  var(--app-width);
          height: var(--app-height);
        }
        #root {
          width:  var(--app-width);
          height: var(--app-height);
          overflow: hidden;
        }
        .app-container {
          width:  var(--app-width)  !important;
          height: var(--app-height) !important;
          max-height: none !important;
          box-shadow: none !important;
          overflow: hidden;
        }
        .app-content { -webkit-overflow-scrolling: touch; }

        /* Tabbar — padding przez --safe-bottom, NIE przez env() */
        .tabbar {
          position: fixed !important;
          bottom: 0; left: 0; right: 0;
          padding-bottom: calc(var(--safe-bottom, 0px) / 2);
          z-index: 100;
          background: #ffffff;
        }
        .contact-fab {
          position: fixed !important;
          bottom: calc(68px + var(--safe-bottom, 0px)) !important;
          right: 16px !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      function getOrientationAngle() {
        if (window.screen && window.screen.orientation && typeof window.screen.orientation.angle === 'number') {
          return window.screen.orientation.angle;
        }
        if (typeof window.orientation === 'number') {
          return window.orientation;
        }
        return 0;
      }

      function setAppSize() {
        var w, h;
        var angle = getOrientationAngle();
        var isLandscape = Math.abs(angle) === 90 || Math.abs(angle) === 270;

        if (window.visualViewport && window.visualViewport.width > 0) {
          w = Math.round(window.visualViewport.width);
          h = Math.round(window.visualViewport.height);
        } else if (window.screen && window.screen.width && window.screen.height) {
          var sw = window.screen.width;
          var sh = window.screen.height;
          if (isLandscape) {
            w = Math.max(sw, sh);
            h = Math.min(sw, sh);
          } else {
            w = Math.min(sw, sh);
            h = Math.max(sw, sh);
          }
        } else {
          w = window.innerWidth;
          h = window.innerHeight;
        }

        // iOS standalone PWA: przy pierwszym załadowaniu visualViewport.height
        // może zawierać strefę home indicator (34px). Odejmujemy ją żeby
        // --app-height wskazywał tylko na użytkową część ekranu.
        // Po rotacji i kolejnych wywołaniach visualViewport zwraca już
        // poprawną wartość — odejmowanie duplikowałoby redukcję, dlatego
        // sprawdzamy czy h > screen.height - 50 (czyli czy h jest "za duże").
        var safeBottom = parseInt(
          document.documentElement.style.getPropertyValue('--safe-bottom') || '0'
        );
        if (safeBottom > 0) {
          var screenH = isLandscape
            ? Math.min(window.screen.width, window.screen.height)
            : Math.max(window.screen.width, window.screen.height);
          // Jeśli h jest bliskie pełnej wysokości ekranu (różnica < 60px),
          // znaczy że visualViewport jeszcze nie odjął strefy home indicator.
          if (h > screenH - 60) {
            h = h - safeBottom;
          }
        }

        document.documentElement.style.setProperty('--app-width',  w + 'px');
        document.documentElement.style.setProperty('--app-height', h + 'px');

        var root = document.getElementById('root');
        if (root) {
          root.style.display = 'none';
          void root.offsetHeight;
          root.style.display = '';
        }
      }

      setAppSize();
      setTimeout(setAppSize, 50);
      setTimeout(setAppSize, 200);
      setTimeout(setAppSize, 500);
      setTimeout(setAppSize, 1000);

      window._eaSetAppSize = setAppSize;

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setAppSize);
      } else {
        window.addEventListener('resize', setAppSize);
      }

      if (window.screen && window.screen.orientation) {
        window.screen.orientation.addEventListener('change', function() {
          setTimeout(setAppSize, 50);
          setTimeout(setAppSize, 200);
          setTimeout(setAppSize, 500);
        });
      }

      window.addEventListener('orientationchange', function() {
        setTimeout(setAppSize, 50);
        setTimeout(setAppSize, 150);
        setTimeout(setAppSize, 300);
        setTimeout(setAppSize, 500);
        setTimeout(setAppSize, 800);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
